<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        h1 {
            background-color: #fdf6e3;
            color: brown;
            text-align: center;
            padding: 100px 0px;
            border: 10px solid gold;
            border-bottom-style: groove;
            border-top-style:inset;
            border-bottom-color: brown;
            border-radius: 30px;
            font-size: 60px;

        }

        #heading {
            background-color: #fdf6e3;
            color: gold;
            text-align: center;
            padding: 100px 0px;
            border: 10px solid brown;
            border-bottom-style: groove;
            border-top-style: inset ;
            border-bottom-color: gold;
            border-radius: 30px;
            font-size: 60px;
            margin-top: 50px;

        }
    </style>

</head>

<body>
    <h1><i>Cascading Style Sheets</i></h1>
    <h1 id="heading"><i>HyperText Markup Language</i></h1>
</body>

</html>
