<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./calsi.css">
</head>
<body>

    <div id="calsi-holder">
        <div id="calculator">

            <section>
                <input type="text" id="display" readonly>
            </section>

            <section>
                <div class="boxes" onclick="appendValue('+')">+</div>
                <div class="boxes" onclick="appendValue('-')">-</div>
                <div class="boxes" onclick="appendValue('*')">*</div>
                <div class="boxes" onclick="appendValue('/')">/</div>
            </section>

            <section>
                <div class="boxes" onclick="appendValue('9')">9</div>
                <div class="boxes" onclick="appendValue('8')">8</div>
                <div class="boxes" onclick="appendValue('7')">7</div>
                <div class="boxes" onclick="appendValue('6')">6</div>
            </section>

            <section>
                <div class="boxes" onclick="appendValue('5')">5</div>
                <div class="boxes" onclick="appendValue('4')">4</div>
                <div class="boxes" onclick="appendValue('3')">3</div>
                <div class="boxes" onclick="appendValue('2')">2</div>
            </section>

            <section>
                <div class="boxes" onclick="appendValue('1')">1</div>
                <div class="boxes" onclick="appendValue('0')">0</div>
                <div class="boxes" onclick="appendValue('.')">.</div>
                <div class="boxes" onclick="clearDisplay()">C</div>
            </section>

            <section>
                <article onclick="calculate()">=</article>
            </section>

        </div>
    </div>

    <script>
        let display = document.getElementById("display");

        function appendValue(value){
            display.value += value;
        }

        function clearDisplay(){
            display.value = "";
        }

        function calculate(){
            try{
                display.value = eval(display.value);
            }catch{
                alert("Invalid Expression");
            }
        }
    </script>

</body>
</html>
