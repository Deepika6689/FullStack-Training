<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>


    <script>
        // ---------------->1--------------
        function createBankAccount() {
            let balance = 0
            return {
                deposit: function (amount) {
                    if (amount <= 0) {
                        alert("invalid amount")
                    } else {
                        balance = amount + balance
                        console.log(`deposited amount :${amount},new balance:${balance}`);
                    }
                },
                withdraw: function (amount) {

                    if (amount <= 0) {
                        alert("invalid amount")
                    } else if (amount > balance) {
                        alert("insufficient balance")
                    } else {
                        balance = balance - amount
                        console.log(`withdraw:${amount},current balance:${balance}`);
                    }


                }

            }
        }
        let deepika = createBankAccount()
        // deepika.deposit(5000)
        // deepika.deposit(1500)
        // deepika.withdraw(500)
        // deepika.withdraw(1500)
        deepika.deposit(10000)
        deepika.deposit(5000)
        deepika.withdraw(3000)
        deepika.withdraw(2000)

        // ------------->output<----------------
        // deposited amount: 10000, new balance: 10000
        // closure.html: 22 deposited amount: 5000, new balance: 15000
        // closure.html: 33 withdraw: 3000, current balance: 12000
        // closure.html: 33 withdraw: 2000, current balance: 10000


        // -------------->2--------------
        function outer() {
            let count = 0
            function inner() {
                count++
                console.log(count);

            }
            return inner
        }
        let counter = outer()
        counter()//1
        counter()//2

        // -------------->output<----------------
        // 1
        // 2


    </script>
</body>

</html>
