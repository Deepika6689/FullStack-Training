<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <center>
        <h1>Sign Up</h1>

        <input type="text" placeholder="Username" id="a"><br><br>
        <input type="text" placeholder="Email" id="b"><br><br>
        <input type="text" placeholder="Password" id="c"><br><br>
        <button onclick="signup()">Sign Up</button>
    </center>
    <script>
        function signup() {
            let username = document.getElementById("a").value;
            let email = document.getElementById("b").value;
            let password = document.getElementById("c").value;

            localStorage.setItem("username", username);
            localStorage.setItem("email", email);
            localStorage.setItem("password", password);
            alert("Sign up successful!");
            window.location.href = "loginpage.html";



        }
    </script>
</body >
</html >
